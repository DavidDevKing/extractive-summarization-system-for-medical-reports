<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Text Summarization</title>
    <link rel="stylesheet" href="style.css" />
    <script
      src="https://kit.fontawesome.com/6550dc34c3.js"
      crossorigin="anonymous"
    ></script>
  </head>

  <body>
    <section class="card-header">
      <h1>AI TEXT SUMMARIZATION SYSTEM</h1>
      <p>Powered By BERT</p>
    </section>

    <section class="summarization-card">
      <section class="input-card card-design">
        <h3>Enter your text to summarize:</h3>
        <textarea
          name=""
          id="summaryInput"
          placeholder="Paste your article, essay, or document here..."
        ></textarea>
        <label for="numSentences">Number of Sentences:</label>
        <input
          type="number"
          id="numSentences"
          min="1"
          placeholder="Type any number"
        />
        <p>Word Count: <span id="wordCount">0</span></p>
        <section class="btn">
          <button id="generateBtn">Generate Summary</button>
          <button id="clearBtn">Clear</button>
        </section>
      </section>

      <section class="output-card card-design">
        <h3>Summary Result:</h3>
        <textarea
          name=""
          id="summaryOutput"
          placeholder="The summarized text will appear here..."
        ></textarea>
        <p></p>
        <button id="copyBtn"><i class="fa-regular fa-copy"></i></button>
      </section>
    </section>
    <script src="script.js"></script>
  </body>
</html>
